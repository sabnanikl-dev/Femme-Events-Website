<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Femme Events — Atlanta Wedding &amp; Event Planning</title>
    <meta name="description" content="Femme Events is an Atlanta-based wedding coordination and design studio offering day-of coordination, partial planning, and full design packages. Serving Atlanta, GA and surrounding areas." />
    <link rel="canonical" href="https://femmeevents.com/" />

    <!-- Mobile / PWA -->
    <meta name="theme-color" content="#831654" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Femme Events" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo-nav.svg" />

    <!-- Preload above-the-fold display fonts. The Seasons (body) is omitted —
         font-display: swap already covers it with system fallbacks. -->
    <link rel="preload" href="/fonts/frunchy-sage.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/fonts/balgin-display-regular.otf" as="font" type="font/otf" crossorigin />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://femmeevents.com/" />
    <meta property="og:title" content="Femme Events — Atlanta Wedding &amp; Event Planning" />
    <meta property="og:description" content="Atlanta wedding coordination and design studio. Day-of coordination, partial planning, and full design packages crafted with intention." />
    <meta property="og:image" content="https://femmeevents.com/og-image.jpg" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Femme Events" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://femmeevents.com/" />
    <meta name="twitter:title" content="Femme Events — Atlanta Wedding &amp; Event Planning" />
    <meta name="twitter:description" content="Atlanta wedding coordination and design studio. Day-of coordination, partial planning, and full design packages crafted with intention." />
    <meta name="twitter:image" content="https://femmeevents.com/og-image.jpg" />

    <!-- Structured Data: LocalBusiness + EventPlanningService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["LocalBusiness", "EventPlanningService"],
      "name": "Femme Events",
      "description": "Atlanta-based wedding coordination and design studio offering day-of coordination, partial planning, and full coordination + design packages.",
      "url": "https://femmeevents.com",
      "telephone": "+16786445257",
      "email": "amanda@femmeevents.com",
      "image": "https://femmeevents.com/og-image.jpg",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Atlanta",
        "addressRegion": "GA",
        "addressCountry": "US"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 33.749,
        "longitude": -84.388
      },
      "areaServed": {
        "@type": "GeoCircle",
        "geoMidpoint": {
          "@type": "GeoCoordinates",
          "latitude": 33.749,
          "longitude": -84.388
        },
        "geoRadius": "80000"
      },
      "sameAs": [
        "https://www.instagram.com/_femmeevents/"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Wedding Coordination Packages",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Just Show Up — Day-of Coordination",
              "description": "8-hour day-of coordination with 2 coordinators, rehearsal coordination, and full vendor management."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Getting It Together — Partial Planning",
              "description": "Everything in day-of coordination plus planning sessions, vendor recommendations, design concept, and budget tracking."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "The Full Femme — Full Coordination + Design",
              "description": "Complete wedding coordination including full design direction, unlimited planning support, and day-after brunch coordination."
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
